<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380">
  <defs>
    <!-- Arrowheads -->
    <marker id="ah-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="ah-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="ah-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>

    <!-- Background -->
    <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- Card fills -->
    <linearGradient id="cg-codex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1f38"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="cg-claude" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c0f38"/>
      <stop offset="100%" stop-color="#130a28"/>
    </linearGradient>
    <linearGradient id="cg-logs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2018"/>
      <stop offset="100%" stop-color="#061510"/>
    </linearGradient>

    <!-- Codex icon cloud gradient -->
    <linearGradient id="ci-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>

    <!-- Codex cloud clip (local coords — applied inside translate group) -->
    <clipPath id="cc">
      <circle cx="-4" cy="-2" r="5.5"/>
      <circle cx="0.5" cy="-4" r="5"/>
      <circle cx="5.5" cy="-2" r="4"/>
      <rect x="-9" y="0" width="18" height="9"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="860" height="380" fill="url(#bg-g)" rx="16"/>

  <!-- Section label -->
  <text x="430" y="28" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="500" fill="#374151" letter-spacing="3">HOW IT WORKS</text>

  <!-- ── You pill ── -->
  <rect x="110" y="46" width="80" height="30" rx="15"
        fill="#1c2433" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="150" y="66" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="12" font-weight="600" fill="#f59e0b">👤  You</text>

  <!-- Arrow: You → Codex -->
  <line x1="150" y1="76" x2="150" y2="115"
        stroke="#f59e0b" stroke-width="1.5" marker-end="url(#ah-amber)"/>
  <text x="159" y="100"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="9" fill="#78716c">delegates task</text>

  <!-- ══ CODEX CARD ══ -->
  <rect x="60" y="118" width="180" height="140" rx="10"
        fill="url(#cg-codex)" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- header band -->
  <rect x="60" y="118" width="180" height="38" rx="10" fill="#1e3a5f" opacity="0.7"/>
  <rect x="60" y="138" width="180" height="18" fill="#1e3a5f" opacity="0.7"/>

  <!-- Codex icon: cloud with >_ (placed left of header text) -->
  <g transform="translate(90, 137)">
    <rect x="-10" y="-12" width="20" height="22" fill="url(#ci-g)" clip-path="url(#cc)"/>
    <text x="0.5" y="5" text-anchor="middle"
          font-family="'SF Mono','Cascadia Code','Fira Code',monospace"
          font-size="7" font-weight="800" fill="white">&gt;_</text>
  </g>

  <!-- Codex title + role (right of icon) -->
  <text x="163" y="136" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="700" fill="#60a5fa">Codex</text>
  <text x="163" y="151" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="9" font-weight="500" fill="#3b82f6" letter-spacing="1">LEAD ORCHESTRATOR</text>

  <line x1="75" y1="159" x2="225" y2="159" stroke="#1e40af" stroke-width="0.75"/>

  <text x="75" y="175"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">· Plans the work</text>
  <text x="75" y="192"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">· Scopes Claude's access</text>
  <text x="75" y="209"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">· Reads summary on done</text>
  <text x="75" y="226"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">· Reports back to you</text>

  <!-- ══ CLAUDE CARD ══ -->
  <rect x="340" y="118" width="180" height="140" rx="10"
        fill="url(#cg-claude)" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="340" y="118" width="180" height="38" rx="10" fill="#3b1f6e" opacity="0.5"/>
  <rect x="340" y="138" width="180" height="18" fill="#3b1f6e" opacity="0.5"/>

  <!-- Claude icon: Anthropic asterisk (12 rounded spokes) -->
  <g transform="translate(370, 137)">
    <line x1="0" y1="-9" x2="0" y2="9"   stroke="#c87243" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-9" x2="0" y2="9"   stroke="#c87243" stroke-width="3" stroke-linecap="round" transform="rotate(30)"/>
    <line x1="0" y1="-9" x2="0" y2="9"   stroke="#c87243" stroke-width="3" stroke-linecap="round" transform="rotate(60)"/>
    <line x1="0" y1="-9" x2="0" y2="9"   stroke="#c87243" stroke-width="3" stroke-linecap="round" transform="rotate(90)"/>
    <line x1="0" y1="-9" x2="0" y2="9"   stroke="#c87243" stroke-width="3" stroke-linecap="round" transform="rotate(120)"/>
    <line x1="0" y1="-9" x2="0" y2="9"   stroke="#c87243" stroke-width="3" stroke-linecap="round" transform="rotate(150)"/>
  </g>

  <!-- Claude title + role -->
  <text x="443" y="136" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="700" fill="#a78bfa">Claude CLI</text>
  <text x="443" y="151" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="9" font-weight="500" fill="#8b5cf6" letter-spacing="1">SCOPED WORKER</text>

  <line x1="355" y1="159" x2="505" y2="159" stroke="#4c1d95" stroke-width="0.75"/>

  <text x="355" y="175"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">· Stays in write scope</text>
  <text x="355" y="192"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">· Streams structured logs</text>
  <text x="355" y="209"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">· Writes summary on exit</text>
  <text x="355" y="226"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">· Resumable by session ID</text>

  <!-- ══ LOGS CARD ══ -->
  <rect x="620" y="118" width="180" height="140" rx="10"
        fill="url(#cg-logs)" stroke="#10b981" stroke-width="1.5"/>
  <rect x="620" y="118" width="180" height="38" rx="10" fill="#064e3b" opacity="0.6"/>
  <rect x="620" y="138" width="180" height="18" fill="#064e3b" opacity="0.6"/>

  <!-- Logs icon: terminal screen with log lines -->
  <g transform="translate(650, 137)">
    <rect x="-9" y="-9" width="18" height="16" rx="2"
          fill="#065f46" stroke="#10b981" stroke-width="0.75"/>
    <rect x="-6" y="-5.5" width="8"  height="1.5" rx="0.5" fill="#34d399"/>
    <rect x="-6" y="-2.5" width="11" height="1.5" rx="0.5" fill="#34d399" opacity="0.7"/>
    <rect x="-6" y="0.5"  width="9"  height="1.5" rx="0.5" fill="#34d399"/>
    <rect x="-6" y="3.5"  width="12" height="1.5" rx="0.5" fill="#34d399" opacity="0.7"/>
  </g>

  <!-- Logs title + role -->
  <text x="724" y="136" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="700" fill="#34d399">.agent-runs/</text>
  <text x="724" y="151" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="9" font-weight="500" fill="#10b981" letter-spacing="1">GIT-IGNORED LOGS</text>

  <line x1="635" y1="159" x2="785" y2="159" stroke="#065f46" stroke-width="0.75"/>

  <text x="635" y="175"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">ledger.json</text>
  <text x="635" y="192"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">*.jsonl</text>
  <text x="635" y="209"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">*.summary.md</text>
  <text x="635" y="226"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#94a3b8">*.stderr.log</text>

  <!-- ── Arrow: Codex → Claude ── -->
  <line x1="242" y1="188" x2="336" y2="188"
        stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ah-blue)"/>
  <text x="289" y="181" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="9" fill="#3b82f6">spawns · scoped</text>

  <!-- ── Arrow: Claude → Logs ── -->
  <line x1="522" y1="188" x2="616" y2="188"
        stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ah-purple)"/>
  <text x="569" y="181" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="9" fill="#8b5cf6">streams logs</text>

  <!-- ── Return arc: Logs → Codex ── -->
  <path d="M 710 258 C 710 330 150 330 150 258"
        stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#ah-green)"/>
  <text x="430" y="350" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="9" fill="#10b981">reads summary</text>
</svg>
